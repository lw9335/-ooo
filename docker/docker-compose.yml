services:
  postgres:
    image: postgres:16-alpine
    container_name: qixiu-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: qixiu-redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data

  api:
    build:
      context: ../apps/api
    container_name: qixiu-api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      NODE_ENV: production
      API_PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      AUTO_IDLE_HOURS: ${AUTO_IDLE_HOURS:-5}
      WEWORK_CORP_ID: ${WEWORK_CORP_ID}
      WEWORK_AGENT_ID: ${WEWORK_AGENT_ID}
      WEWORK_SECRET: ${WEWORK_SECRET}
      MOBILE_BASE_URL: ${MOBILE_BASE_URL}
    expose:
      - '3000'

  admin:
    build:
      context: ../apps/admin
    container_name: qixiu-admin
    restart: always
    expose:
      - '80'

  mobile:
    build:
      context: ../apps/mobile
    container_name: qixiu-mobile
    restart: always
    expose:
      - '80'

  gateway:
    image: nginx:alpine
    container_name: qixiu-gateway
    restart: always
    depends_on:
      - api
      - admin
      - mobile
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/gateway.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro

volumes:
  pgdata:
  redisdata:
