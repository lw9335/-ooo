# IP mode (no domain yet): default server on port 80
#   http://YOUR_IP/        -> admin dashboard
#   http://YOUR_IP/api/    -> backend API
#   http://YOUR_IP:8081/   -> mobile H5 (see docker-compose ports)

map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

# ---------- Default: access by public IP (no domain) ----------
server {
  listen 80 default_server;
  server_name _;

  client_max_body_size 10m;

  location /api/ {
    proxy_pass http://api:3000/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /socket.io/ {
    proxy_pass http://api:3000/socket.io/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
  }

  location / {
    proxy_pass http://admin:80;
    proxy_set_header Host $host;
  }
}

